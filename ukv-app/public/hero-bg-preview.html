<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Hero background options</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--cta:#C75D38;--ink:#22282b;--muted:#697079;--sage:#5C9A7B;--sage-t:#3f7259;--paper:#F4F5F6;--edge:#e6e8ea;--j:'Plus Jakarta Sans',system-ui,sans-serif;--lift3:0 30px 64px -30px rgba(40,50,70,.45)}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--j);color:var(--ink);background:#eceef0}
  .ph{max-width:1080px;margin:0 auto;padding:34px 22px 4px}
  .ph h1{font-size:27px;letter-spacing:-.02em;margin:0 0 6px}.ph p{color:var(--muted);margin:0;max-width:66ch}
  .wrapx{max-width:1140px;margin:0 auto;padding:14px 20px}
  .block{background:#fff;border:1px solid var(--edge);border-radius:18px;overflow:hidden;margin:22px 0;box-shadow:0 16px 44px -30px rgba(40,50,70,.4)}
  .block.pick{outline:3px solid var(--cta);outline-offset:3px}
  .label{font:800 11px var(--j);letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:12px 20px 0}
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;flex-wrap:wrap;border-top:1px solid var(--edge)}
  .meta h2{font-size:17px;margin:0}.meta p{font-size:13.5px;margin:3px 0 0;max-width:64ch;color:var(--muted)}
  .num{display:inline-block;background:var(--paper);color:var(--cta);font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;margin-right:8px}
  .pickbtn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;font:700 14px var(--j);cursor:pointer;white-space:nowrap}
  .pickbtn.on{background:var(--sage)}

  /* the hero content (same in every variant) */
  .hero{position:relative;overflow:hidden;text-align:center;padding:54px 30px 60px;border-bottom:1px solid var(--edge)}
  .hero .in{position:relative;z-index:2;max-width:880px;margin:0 auto}
  .eyebrow{font:700 12px var(--j);letter-spacing:.18em;text-transform:uppercase;color:var(--cta);margin:0 0 12px}
  .hero h3{font:800 clamp(32px,4.6vw,52px)/1.02 var(--j);letter-spacing:-.03em;margin:0 auto 14px;max-width:20ch}
  .lede{color:var(--muted);font-size:18px;line-height:1.5;max-width:52ch;margin:0 auto}
  .rating{display:inline-flex;gap:8px;align-items:center;margin:14px 0 0;font:700 14px var(--j);color:var(--sage-t)}.rating b{color:var(--cta)}
  .bar{display:flex;gap:10px;align-items:flex-end;background:#fff;border:1px solid var(--edge);border-radius:16px;box-shadow:var(--lift3);padding:16px;max-width:740px;margin:26px auto 0;text-align:left}
  .bar .f{flex:1}.bar label{display:block;font:700 12px var(--j);margin:0 0 4px}.bar select{width:100%;padding:11px;border:1px solid var(--edge);border-radius:10px;font:inherit;font-size:15px;background:#fff}
  .btn{background:var(--cta);color:#fff;border:0;border-radius:11px;padding:0 22px;font:700 14px var(--j);white-space:nowrap}
  .chips{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:20px 0 0}
  .chips span{background:rgba(255,255,255,.72);border:1px solid var(--edge);border-radius:999px;padding:7px 13px;font:600 13px var(--j)}

  /* ===== background variants ===== */
  /* A current mesh */
  .bgA{background:radial-gradient(900px 380px at 50% -12%,rgba(199,93,56,.14),transparent 60%),radial-gradient(680px 340px at 90% 120%,rgba(92,154,123,.16),transparent 60%),linear-gradient(180deg,#FBFBFC,var(--paper))}
  /* B clean paper (minimal) */
  .bgB{background:var(--paper)}
  /* C photo wash */
  .bgC{background:linear-gradient(180deg,rgba(244,245,246,.86),rgba(244,245,246,.96)),url('/assets/img/destinations/thailand.jpg') center/cover}
  /* D warm sunrise */
  .bgD{background:linear-gradient(180deg,#FDEFE7 0%,#FBF6F1 38%,var(--paper) 100%)}
  /* E dot grid + faint mesh */
  .bgE{background:radial-gradient(circle at center,rgba(34,40,43,.06) 1px,transparent 1.4px) 0 0/22px 22px,radial-gradient(800px 340px at 50% -10%,rgba(199,93,56,.10),transparent 60%),#FBFBFC}
  /* F soft sky */
  .bgF{background:linear-gradient(180deg,#EAF1F4 0%,#F2F5F6 45%,var(--paper) 100%)}

  .sticky{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:13px 22px;text-align:center;font:600 14px var(--j);z-index:60}
  .sticky b{color:#F2C2AC}
  @media(max-width:720px){.bar{flex-direction:column;align-items:stretch}.btn{padding:13px 22px}}
</style>
</head>
<body>
<div class="ph">
  <h1>Hero background options</h1>
  <p>Same hero, six background treatments. Pick one — tell me the letter. (A is what's live now.)</p>
</div>
<div class="wrapx" id="list"></div>
<div class="sticky" id="sticky">Pick a background, then tell me the letter (e.g. “Background C”).</div>

<script>
  var heroHTML = function(){return ''
   +'<div class="in">'
   +'<p class="eyebrow">UK visas · eVisas · ETAs</p>'
   +'<h3>Sorted, without the stress.</h3>'
   +'<p class="lede">Tell us where you\'re going — we confirm exactly what you need and handle the paperwork.</p>'
   +'<div class="rating"><span><b>★ 4.9</b> rated</span><span>· 12,000+ trips</span></div>'
   +'<div class="bar"><div class="f"><label>Where are you going?</label><select><option>Choose a destination…</option><option>Turkey</option></select></div>'
   +'<div class="f"><label>Your passport</label><select><option>United Kingdom</option></select></div>'
   +'<button class="btn">Check what I need →</button></div>'
   +'<div class="chips"><span>✓ UK-based team</span><span>✓ Fixed fees</span><span>✓ Every step tracked</span></div>'
   +'</div>';};
  var opts=[
    ['A','bgA','Gradient mesh (current)','Terracotta→sage radial mesh on near-white. Warm, branded, subtle — what is live now.'],
    ['B','bgB','Clean paper (minimal)','Flat cool-grey, no gradient. Maximum calm + restraint; lets the form be the only focus.'],
    ['C','bgC','Photo wash','A faint full-bleed destination photo under a heavy paper overlay. Travel atmosphere without losing legibility.'],
    ['D','bgD','Warm sunrise','Soft peach→paper vertical gradient. Optimistic, travel-warm, still light.'],
    ['E','bgE','Dot grid + mesh','Near-white with a faint dot grid texture + soft terracotta glow. Modern, “product/SaaS” feel.'],
    ['F','bgF','Soft sky','Cool blue→paper gradient. Airy, calm, “departure sky” cue. Cooler than the brand warm.']
  ];
  var html='';
  opts.forEach(function(o){
    html+='<div class="block" id="b-'+o[0]+'">'
      +'<div class="label">Background '+o[0]+' — preview</div>'
      +'<div class="hero '+o[1]+'">'+heroHTML()+'</div>'
      +'<div class="meta"><div><h2><span class="num">'+o[0]+'</span>'+o[2]+'</h2><p>'+o[3]+'</p></div>'
      +'<button class="pickbtn" data-k="'+o[0]+'">Pick '+o[0]+'</button></div></div>';
  });
  document.getElementById('list').innerHTML=html;
  document.querySelectorAll('.pickbtn').forEach(function(b){b.addEventListener('click',function(){
    document.querySelectorAll('.pickbtn').forEach(function(x){x.classList.remove('on');x.textContent='Pick '+x.dataset.k;});
    document.querySelectorAll('.block').forEach(function(c){c.classList.remove('pick');});
    b.classList.add('on');b.textContent='✓ Picked';document.getElementById('b-'+b.dataset.k).classList.add('pick');
    document.getElementById('sticky').innerHTML='Chosen: <b>Background '+b.dataset.k+'</b> — tell me this in chat and I’ll apply it to the live hero.';
  });});
</script>
</body></html>
