<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Destination cards — more options</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--cta:#C75D38;--ink:#22282b;--muted:#697079;--sage:#5C9A7B;--sage-t:#3f7259;--paper:#F4F5F6;--edge:#e6e8ea;--white:#fff;--soft:#F2C2AC;--j:'Plus Jakarta Sans',system-ui,sans-serif;
    --lift1:0 18px 44px -26px rgba(40,50,70,.3);--lift2:0 24px 52px -24px rgba(40,50,70,.34)}
  *{box-sizing:border-box}body{margin:0;font-family:var(--j);color:var(--ink);background:#eceef0}
  .ph{max-width:1000px;margin:0 auto;padding:34px 22px 4px}.ph h1{font-size:26px;margin:0 0 6px;font-weight:700}.ph p{color:var(--muted);margin:0;max-width:66ch}
  .wrapx{max-width:1080px;margin:0 auto;padding:14px 20px}
  .block{background:#fff;border:1px solid var(--edge);border-radius:18px;overflow:hidden;margin:22px 0;box-shadow:0 16px 44px -30px rgba(40,50,70,.4)}
  .block.pick{outline:3px solid var(--cta);outline-offset:3px}
  .stage{padding:34px;background:var(--paper)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;flex-wrap:wrap;border-top:1px solid var(--edge)}
  .meta h4{font-size:17px;margin:0;font-weight:700}.meta p{font-size:13.5px;margin:3px 0 0;max-width:62ch;color:var(--muted)}
  .num{display:inline-block;background:#fff;color:var(--cta);font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;margin-right:8px;border:1px solid var(--edge)}
  .pickbtn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;font:700 14px var(--j);cursor:pointer}.pickbtn.on{background:var(--sage)}

  /* E glass info panel floating on photo */
  .E .card{position:relative;height:240px;border-radius:18px;overflow:hidden;box-shadow:var(--lift2);background:center/cover}
  .E .glass{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(255,255,255,.82);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
  .E .k{font:700 10px var(--j);color:var(--sage-t);letter-spacing:.1em;text-transform:uppercase}.E h5{font-size:17px;margin:2px 0 0}.E .fee{font:800 16px var(--j);color:var(--cta)}

  /* F horizontal split card */
  .F .card{display:grid;grid-template-columns:128px 1fr;background:#fff;border:1px solid var(--edge);border-radius:16px;overflow:hidden;box-shadow:var(--lift1)}
  .F .pic{background:center/cover}.F .bd{padding:16px 18px;display:flex;flex-direction:column;justify-content:center}
  .F .k{font:700 11px var(--j);color:var(--sage-t);letter-spacing:.1em;text-transform:uppercase}.F h5{font-size:18px;margin:4px 0 6px}
  .F .row{display:flex;justify-content:space-between;align-items:baseline}.F .fee{font:800 17px var(--j);color:var(--cta)}.F .go{font:700 13px var(--j);color:var(--cta)}

  /* G hover reveal */
  .G .card{position:relative;height:230px;border-radius:18px;overflow:hidden;box-shadow:var(--lift2);background:center/cover;cursor:pointer}
  .G .card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(20,18,16,.82))}
  .G .tx{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:16px;color:#fff}
  .G .tx h5{font-size:19px;margin:0;color:#fff}.G .fee{font:800 14px var(--j);color:var(--soft)}
  .G .more{max-height:0;opacity:0;overflow:hidden;transition:.3s ease;color:rgba(255,255,255,.9);font-size:13px}
  .G .card:hover .more{max-height:60px;opacity:1;margin-top:6px}

  /* H ticket / boarding-pass card */
  .H .card{background:#fff;border:1px solid var(--edge);border-radius:16px;overflow:hidden;box-shadow:var(--lift1);position:relative}
  .H .pic{height:120px;background:center/cover}
  .H .perf{height:0;border-top:2px dashed var(--edge);position:relative}
  .H .perf::before,.H .perf::after{content:"";position:absolute;top:-9px;width:16px;height:16px;border-radius:50%;background:var(--paper)}
  .H .perf::before{left:-9px}.H .perf::after{right:-9px}
  .H .bd{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-end}
  .H .k{font:800 10px var(--j);color:var(--cta);letter-spacing:.12em}.H h5{font-size:18px;margin:3px 0 0}.H .fee{font:800 18px var(--j);color:var(--cta)}.H .lab{font:700 9px var(--j);color:var(--muted);letter-spacing:.08em;text-align:right}

  .sticky{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:13px 22px;text-align:center;font:600 14px var(--j);z-index:60}.sticky b{color:var(--soft)}
  @media(max-width:720px){.grid,.grid2{grid-template-columns:1fr}}
</style></head><body>
<div class="ph"><h1>Destination cards — more options</h1><p>Batch 2 (E–H), distinct from A–D. Pick one — tell me the letter.</p></div>
<div class="wrapx" id="list"></div>
<div class="sticky" id="sticky">Pick a card style, then tell me the letter (e.g. “Cards H”).</div>
<script>
  var D=[['Turkey','eVisa','£39','/assets/img/destinations/turkey.jpg'],
         ['Thailand','Visa-free','£35','/assets/img/destinations/thailand.jpg'],
         ['India','eVisa','£49','/assets/img/destinations/india.jpg']];
  var V={
   E:function(){var h='<div class="grid E">';D.forEach(function(d){h+='<div class="card" style="background-image:url(\''+d[3]+'\')"><div class="glass"><div><div class="k">'+d[1]+'</div><h5>'+d[0]+'</h5></div><div class="fee">'+d[2]+'</div></div></div>';});return h+'</div>';},
   F:function(){var h='<div class="grid2 F">';D.slice(0,2).forEach(function(d){h+='<div class="card"><div class="pic" style="background-image:url(\''+d[3]+'\')"></div><div class="bd"><div class="k">'+d[1]+'</div><h5>'+d[0]+'</h5><div class="row"><span class="fee">from '+d[2]+'</span><span class="go">View →</span></div></div></div>';});return h+'</div>';},
   G:function(){var h='<div class="grid G">';D.forEach(function(d){h+='<div class="card" style="background-image:url(\''+d[3]+'\')"><div class="tx"><h5>'+d[0]+' · <span class="fee">from '+d[2]+'</span></h5><div class="more">'+d[1]+' · UK citizens · checked by our team. View details →</div></div></div>';});return h+'</div>';},
   H:function(){var h='<div class="grid H">';D.forEach(function(d){h+='<div class="card"><div class="pic" style="background-image:url(\''+d[3]+'\')"></div><div class="perf"></div><div class="bd"><div><div class="k">'+d[1].toUpperCase()+'</div><h5>'+d[0]+'</h5></div><div><div class="fee">'+d[2]+'</div><div class="lab">FROM</div></div></div></div>';});return h+'</div>';}
  };
  var opts=[
   ['E','Glass info panel','Full photo with a frosted-glass info bar floating at the bottom (name + price). Sleek, premium, very modern.'],
   ['F','Horizontal split','Photo left, details right (landscape). Calmer, fits more text, good 2-up layout; reads like a listing.'],
   ['G','Hover reveal','Photo card; name + price always visible, extra details slide up on hover. Interactive, clean at rest.'],
   ['H','Boarding-pass card','Each destination as a mini ticket (photo + perforation + fee). Ties to the brand signature; distinctive.']
  ];
  var html='';opts.forEach(function(o){html+='<div class="block" id="b-'+o[0]+'"><div class="stage">'+V[o[0]]()+'</div><div class="meta"><div><h4><span class="num">'+o[0]+'</span>'+o[1]+'</h4><p>'+o[2]+'</p></div><button class="pickbtn" data-k="'+o[0]+'">Pick '+o[0]+'</button></div></div>';});
  document.getElementById('list').innerHTML=html;
  document.querySelectorAll('.pickbtn').forEach(function(b){b.addEventListener('click',function(){
    document.querySelectorAll('.pickbtn').forEach(function(x){x.classList.remove('on');x.textContent='Pick '+x.dataset.k;});
    document.querySelectorAll('.block').forEach(function(c){c.classList.remove('pick');});
    b.classList.add('on');b.textContent='✓ Picked';document.getElementById('b-'+b.dataset.k).classList.add('pick');
    document.getElementById('sticky').innerHTML='Chosen: <b>Cards '+b.dataset.k+'</b> — tell me in chat.';});});
</script></body></html>
