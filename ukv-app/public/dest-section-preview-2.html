<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Destinations section — more full previews</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--cta:#C75D38;--ink:#22282b;--muted:#697079;--sage:#5C9A7B;--sage-t:#3f7259;--paper:#F4F5F6;--edge:#e6e8ea;--white:#fff;--soft:#F2C2AC;--j:'Plus Jakarta Sans',system-ui,sans-serif;
    --lift2:0 24px 52px -24px rgba(40,50,70,.34)}
  *{box-sizing:border-box}body{margin:0;font-family:var(--j);color:var(--ink);background:#eceef0}
  .ph{max-width:1000px;margin:0 auto;padding:34px 22px 4px}.ph h1{font-size:26px;margin:0 0 6px;font-weight:700}.ph p{color:var(--muted);margin:0;max-width:70ch}
  .wrapx{max-width:1180px;margin:0 auto;padding:14px 16px}
  .block{background:#fff;border:1px solid var(--edge);border-radius:18px;overflow:hidden;margin:22px 0;box-shadow:0 16px 44px -30px rgba(40,50,70,.4)}
  .block.pick{outline:3px solid var(--cta);outline-offset:3px}
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;flex-wrap:wrap;border-top:1px solid var(--edge)}
  .meta h4{font-size:17px;margin:0;font-weight:700}.meta p{font-size:13.5px;margin:3px 0 0;max-width:64ch;color:var(--muted)}
  .num{display:inline-block;background:var(--paper);color:var(--cta);font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;margin-right:8px}
  .pickbtn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;font:700 14px var(--j);cursor:pointer}.pickbtn.on{background:var(--sage)}
  .sec{padding:48px 36px}.wrap{max-width:1080px;margin:0 auto}
  .eb{font:700 12px var(--j);letter-spacing:.18em;text-transform:uppercase;color:var(--cta);margin:0 0 8px}
  .h2{font:700 clamp(26px,3vw,34px)/1.05 var(--j);letter-spacing:-.02em;margin:0}
  .btn{display:inline-block;background:var(--cta);color:#fff;border-radius:11px;padding:11px 18px;font:700 13.5px var(--j);text-decoration:none;margin-top:14px}
  .rlink{font:700 14px var(--j);color:var(--cta)}
  /* glass card */
  .card{position:relative;height:200px;border-radius:16px;overflow:hidden;background:center/cover;box-shadow:var(--lift2)}
  .card.tall{height:100%}
  .card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(20,18,16,.35))}
  .glass{position:absolute;left:10px;right:10px;bottom:10px;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:8px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);border-radius:12px;padding:9px 12px}
  .glass .k{font:700 9px var(--j);color:var(--sage-t);letter-spacing:.1em;text-transform:uppercase}.glass h5{font-size:15px;margin:1px 0 0}.glass .fee{font:800 15px var(--j);color:var(--cta)}

  /* E split intro */
  .E .row{display:grid;grid-template-columns:.85fr 1.15fr;gap:34px;align-items:center}
  .E .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  /* F featured + grid */
  .F .row{display:grid;grid-template-columns:1.3fr 1fr;gap:18px}
  .F .side{display:grid;grid-template-rows:1fr 1fr;gap:18px}
  .F .feat{height:auto}
  /* G map-texture backdrop */
  .G{background:radial-gradient(circle at 20% 30%,rgba(92,154,123,.1),transparent 40%),radial-gradient(circle at 80% 70%,rgba(199,93,56,.1),transparent 40%),repeating-linear-gradient(0deg,rgba(34,40,43,.03) 0 1px,transparent 1px 26px),var(--paper)}
  .G .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  /* H carousel row */
  .H{background:var(--white);border-top:1px solid var(--edge);border-bottom:1px solid var(--edge)}
  .H .scroller{display:grid;grid-auto-flow:column;grid-auto-columns:240px;gap:16px;overflow-x:auto;padding-bottom:8px}
  .H .scroller .card{width:240px}
  .H .arrows{float:right;display:flex;gap:6px}.H .arrows span{width:34px;height:34px;border:1px solid var(--edge);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--cta);font-weight:800}

  .sticky{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:13px 22px;text-align:center;font:600 14px var(--j);z-index:60}.sticky b{color:var(--soft)}
  @media(max-width:760px){.E .row,.F .row{grid-template-columns:1fr}.G .cards{grid-template-columns:1fr}}
</style></head><body>
<div class="ph"><h1>Destinations section — more full previews</h1><p>Batch 2 (E–H), distinct layouts/backgrounds. Pick one — tell me the letter.</p></div>
<div class="wrapx" id="list"></div>
<div class="sticky" id="sticky">Pick a section style, then tell me the letter (e.g. “Section F”).</div>
<script>
  var D=[['Turkey','eVisa','£39','/assets/img/destinations/turkey.jpg'],['Thailand','Visa-free','£35','/assets/img/destinations/thailand.jpg'],['India','eVisa','£49','/assets/img/destinations/india.jpg'],['UAE','Visa on arrival','£45','/assets/img/destinations/uae.jpg']];
  function card(d,extra){return '<div class="card '+(extra||'')+'" style="background-image:url(\''+d[3]+'\')"><div class="glass"><div><div class="k">'+d[1]+'</div><h5>'+d[0]+'</h5></div><div class="fee">'+d[2]+'</div></div></div>';}
  var V={
   E:function(){return '<div class="sec E"><div class="wrap"><div class="row"><div><p class="eb">Popular destinations</p><h2 class="h2">Clear requirements, fixed fees</h2><p style="color:var(--muted);margin:12px 0 0;max-width:34ch">Browse the places we prepare and check applications for — clear fees, every step tracked.</p><a class="btn">See all destinations →</a></div><div class="cards">'+card(D[0])+card(D[1])+card(D[2])+card(D[3])+'</div></div></div></div>';},
   F:function(){return '<div class="sec F"><div class="wrap"><div style="margin:0 0 24px"><p class="eb">Popular destinations</p><h2 class="h2">Clear requirements, fixed fees</h2></div><div class="row"><div class="card feat" style="background-image:url(\''+D[0][3]+'\');min-height:340px"><div class="glass"><div><div class="k">Most popular · '+D[0][1]+'</div><h5>'+D[0][0]+'</h5></div><div class="fee">'+D[0][2]+'</div></div></div><div class="side">'+card(D[1])+card(D[2])+'</div></div><a class="rlink" style="display:inline-block;margin-top:20px">See all destinations &amp; fixed fees →</a></div></div>';},
   G:function(){return '<div class="sec G"><div class="wrap"><div style="text-align:center;margin:0 0 26px"><p class="eb">Popular destinations</p><h2 class="h2">Clear requirements, fixed fees</h2></div><div class="cards">'+card(D[0])+card(D[1])+card(D[2])+'</div></div></div>';},
   H:function(){return '<div class="sec H"><div class="wrap"><div style="margin:0 0 20px"><span class="arrows"><span>‹</span><span>›</span></span><p class="eb">Popular destinations</p><h2 class="h2">Clear requirements, fixed fees</h2></div><div class="scroller">'+card(D[0])+card(D[1])+card(D[2])+card(D[3])+card(D[0])+'</div></div></div>';}
  };
  var opts=[
   ['E','Split intro + 2×2','Heading + blurb + button on the left, a 2×2 card grid on the right. Editorial, asymmetric, strong CTA.'],
   ['F','Featured + grid','One big “most popular” destination beside two smaller cards. Adds hierarchy, draws the eye to your hero country.'],
   ['G','Map-texture backdrop','Faint topographic lines + soft brand glows behind centred cards. Travel-map atmosphere, gallery feel.'],
   ['H','Carousel row','Horizontal scroller with a peek of the next card + arrows. Scales to many destinations without a tall grid.']
  ];
  var html='';opts.forEach(function(o){html+='<div class="block" id="b-'+o[0]+'">'+V[o[0]]()+'<div class="meta"><div><h4><span class="num">'+o[0]+'</span>'+o[1]+'</h4><p>'+o[2]+'</p></div><button class="pickbtn" data-k="'+o[0]+'">Pick '+o[0]+'</button></div></div>';});
  document.getElementById('list').innerHTML=html;
  document.querySelectorAll('.pickbtn').forEach(function(b){b.addEventListener('click',function(){
    document.querySelectorAll('.pickbtn').forEach(function(x){x.classList.remove('on');x.textContent='Pick '+x.dataset.k;});
    document.querySelectorAll('.block').forEach(function(c){c.classList.remove('pick');});
    b.classList.add('on');b.textContent='✓ Picked';document.getElementById('b-'+b.dataset.k).classList.add('pick');
    document.getElementById('sticky').innerHTML='Chosen: <b>Section '+b.dataset.k+'</b> — tell me in chat.';});});
</script></body></html>
