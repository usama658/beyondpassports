<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Process section — more premium ideas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--cta:#C75D38;--cta-d:#b04e2c;--ink:#22282b;--muted:#697079;--sage:#5C9A7B;--sage-t:#3f7259;--paper:#F4F5F6;--soft:#F2C2AC;--edge:#e6e8ea;--j:'Plus Jakarta Sans',system-ui,sans-serif;
    --lift1:0 18px 44px -26px rgba(40,50,70,.3);--lift2:0 26px 56px -28px rgba(40,50,70,.4)}
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--j);color:var(--ink);background:#eceef0}
  .ph{max-width:1000px;margin:0 auto;padding:34px 22px 4px}
  .ph h1{font-size:26px;letter-spacing:-.02em;margin:0 0 6px;font-weight:700}.ph p{color:var(--muted);margin:0;max-width:66ch}
  .wrapx{max-width:1080px;margin:0 auto;padding:14px 20px}
  .block{background:#fff;border:1px solid var(--edge);border-radius:18px;overflow:hidden;margin:22px 0;box-shadow:0 16px 44px -30px rgba(40,50,70,.4)}
  .block.pick{outline:3px solid var(--cta);outline-offset:3px}
  .stage{padding:40px 34px}
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;flex-wrap:wrap;border-top:1px solid var(--edge)}
  .meta h4{font-size:17px;margin:0;font-weight:700}.meta p{font-size:13.5px;margin:3px 0 0;max-width:62ch;color:var(--muted)}
  .num{display:inline-block;background:#fff;color:var(--cta);font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;margin-right:8px;border:1px solid var(--edge)}
  .pickbtn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;font:700 14px var(--j);cursor:pointer;white-space:nowrap}.pickbtn.on{background:var(--sage)}
  .sechead{text-align:center;margin:0 0 30px}.sechead .eb{font:700 12px var(--j);letter-spacing:.18em;text-transform:uppercase;color:var(--cta);margin:0 0 8px}.sechead h3{font:700 30px/1.05 var(--j);letter-spacing:-.02em;margin:0}
  h5{margin:0;font-weight:700;font-size:18px;letter-spacing:-.01em}.desc{color:var(--muted);font-size:14.5px;line-height:1.55;margin:6px 0 0}

  /* E boarding-pass ticket strip */
  .E{display:flex;gap:0;background:#fff;border:1px solid var(--edge);border-radius:18px;box-shadow:var(--lift2);overflow:hidden}
  .E .step{flex:1;padding:24px 22px;position:relative}
  .E .step+.step{border-left:2px dashed var(--edge)}
  .E .step+.step::before,.E .step+.step::after{content:"";position:absolute;left:-9px;width:16px;height:16px;border-radius:50%;background:#eceef0}
  .E .step+.step::before{top:-8px}.E .step+.step::after{bottom:-8px}
  .E .barcode{font:800 12px var(--j);letter-spacing:.12em;color:var(--cta)}
  .E .seat{float:right;font:800 22px var(--j);color:rgba(34,40,43,.12)}

  /* F dark mesh band + glass numbered cards */
  .F{border-radius:18px;padding:34px 26px;background:radial-gradient(600px 240px at 14% 0%,rgba(199,93,56,.5),transparent 60%),radial-gradient(560px 240px at 92% 100%,rgba(92,154,123,.5),transparent 60%),#22282b}
  .F .sechead h3,.F .sechead .eb{color:#fff}.F .sechead .eb{color:var(--soft)}
  .F .row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .F .step{background:rgba(255,255,255,.1);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:22px;color:#fff}
  .F .circ{width:42px;height:42px;border-radius:12px;background:var(--cta);color:#fff;font:800 18px var(--j);display:flex;align-items:center;justify-content:center;margin:0 0 14px}
  .F h5{color:#fff}.F .desc{color:rgba(255,255,255,.8)}
  @media(max-width:720px){.F .row,.E{grid-template-columns:1fr;flex-direction:column}.E .step+.step{border-left:0;border-top:2px dashed var(--edge)}}

  /* G oversized editorial numerals, alternating rows */
  .G .step{display:grid;grid-template-columns:140px 1fr;gap:24px;align-items:center;padding:18px 0;border-top:1px solid var(--edge)}
  .G .step:first-child{border-top:0}
  .G .bignum{font:800 92px var(--j);line-height:.9;letter-spacing:-.05em;background:linear-gradient(180deg,var(--cta),var(--cta-d));-webkit-background-clip:text;background-clip:text;color:transparent;text-align:center}
  .G h5{font-size:21px}
  @media(max-width:600px){.G .step{grid-template-columns:80px 1fr}.G .bignum{font-size:60px}}

  /* H photo-topped step cards */
  .H{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .H .step{background:#fff;border:1px solid var(--edge);border-radius:16px;overflow:hidden;box-shadow:var(--lift1)}
  .H .pic{height:96px;background:center/cover;position:relative}
  .H .pic span{position:absolute;left:14px;bottom:-16px;width:36px;height:36px;border-radius:10px;background:var(--cta);color:#fff;font:800 15px var(--j);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 16px -6px rgba(199,93,56,.6)}
  .H .bd{padding:24px 18px 20px}
  @media(max-width:720px){.H{grid-template-columns:1fr}}

  .sticky{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:13px 22px;text-align:center;font:600 14px var(--j);z-index:60}.sticky b{color:var(--soft)}
</style>
</head>
<body>
<div class="ph"><h1>Process section — more premium ideas</h1><p>Batch 2 (E–H), distinct from A–D. Pick one — tell me the letter.</p></div>
<div class="wrapx" id="list"></div>
<div class="sticky" id="sticky">Pick a layout, then tell me the letter (e.g. “Steps F”).</div>
<script>
  var S=[['Tell us your trip','Pick your destination and answer a few questions. We confirm exactly what you need.','/assets/img/destinations/turkey.jpg'],
         ['We prepare & check','Our team reviews your documents for errors before anything is submitted.','/assets/img/destinations/thailand.jpg'],
         ['Submit & track','We handle the submission and keep you updated until it\'s delivered.','/assets/img/destinations/uae.jpg']];
  function head(){return '<div class="sechead"><p class="eb">The process</p><h3>Three simple steps</h3></div>';}
  var V={
   E:function(){var h='<div class="E">';S.forEach(function(s,i){h+='<div class="step"><span class="seat">0'+(i+1)+'</span><div class="barcode">STEP 0'+(i+1)+'</div><h5 style="margin-top:10px">'+s[0]+'</h5><p class="desc">'+s[1]+'</p></div>';});return h+'</div>';},
   F:function(){var h='<div class="F">'+head().replace('sechead','sechead')+'<div class="row">';S.forEach(function(s,i){h+='<div class="step"><div class="circ">'+(i+1)+'</div><h5>'+s[0]+'</h5><p class="desc">'+s[1]+'</p></div>';});return h+'</div></div>';},
   G:function(){var h='<div class="G">';S.forEach(function(s,i){h+='<div class="step"><div class="bignum">0'+(i+1)+'</div><div><h5>'+s[0]+'</h5><p class="desc">'+s[1]+'</p></div></div>';});return h+'</div>';},
   H:function(){var h='<div class="H">';S.forEach(function(s,i){h+='<div class="step"><div class="pic" style="background-image:url(\''+s[2]+'\')"><span>'+(i+1)+'</span></div><div class="bd"><h5>'+s[0]+'</h5><p class="desc">'+s[1]+'</p></div></div>';});return h+'</div>';}
  };
  var opts=[
    ['E','Boarding-pass strip','Steps as one boarding-pass ticket — dashed perforations + notches + “seat” numbers. Distinctive travel signature, on-brand.'],
    ['F','Dark mesh + glass cards','The section on a terracotta→sage mesh ink band with frosted glass numbered cards. High “wow”, premium contrast break.'],
    ['G','Oversized numerals','Big gradient 01/02/03 beside each step in stacked editorial rows. Confident, magazine-like, type-led.'],
    ['H','Photo-topped cards','Each step card has a small destination photo with a number badge. Warm, visual, ties steps to travel.']
  ];
  var html='';opts.forEach(function(o){html+='<div class="block" id="b-'+o[0]+'"><div class="stage">'+(o[0]==='F'?'':head())+V[o[0]]()+'</div><div class="meta"><div><h4><span class="num">'+o[0]+'</span>'+o[1]+'</h4><p>'+o[2]+'</p></div><button class="pickbtn" data-k="'+o[0]+'">Pick '+o[0]+'</button></div></div>';});
  document.getElementById('list').innerHTML=html;
  document.querySelectorAll('.pickbtn').forEach(function(b){b.addEventListener('click',function(){
    document.querySelectorAll('.pickbtn').forEach(function(x){x.classList.remove('on');x.textContent='Pick '+x.dataset.k;});
    document.querySelectorAll('.block').forEach(function(c){c.classList.remove('pick');});
    b.classList.add('on');b.textContent='✓ Picked';document.getElementById('b-'+b.dataset.k).classList.add('pick');
    document.getElementById('sticky').innerHTML='Chosen: <b>Steps '+b.dataset.k+'</b> — tell me this in chat and I’ll apply it.';
  });});
</script>
</body></html>
