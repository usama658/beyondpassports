<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Why section — premium previews</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cta:#C75D38;--cta-d:#b04e2c;--ink:#22282b;--muted:#697079;--sage:#5C9A7B;--sage-t:#3f7259;
    --paper:#F4F5F6;--edge:#e6e8ea;--white:#fff;--soft:#F2C2AC;
    --j:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,sans-serif;
    --lift:0 18px 44px -28px rgba(40,50,70,.42)
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--j);color:var(--muted);background:#eceef0;padding-bottom:64px}
  /* page chrome */
  .ph{max-width:1000px;margin:0 auto;padding:34px 22px 4px}
  .ph h1{font-size:26px;margin:0 0 6px;font-weight:700;letter-spacing:-.02em;color:var(--ink)}
  .ph p{color:var(--muted);margin:0;max-width:70ch}
  .wrapx{max-width:1180px;margin:0 auto;padding:14px 16px}
  .block{background:#fff;border:1px solid var(--edge);border-radius:18px;overflow:hidden;margin:22px 0;box-shadow:0 16px 44px -30px rgba(40,50,70,.4)}
  .block.pick{outline:3px solid var(--cta);outline-offset:3px}
  .label{font:700 12px var(--j);letter-spacing:.14em;text-transform:uppercase;color:var(--sage-t);padding:14px 20px 0}
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;flex-wrap:wrap;border-top:1px solid var(--edge)}
  .meta h4{font-size:17px;margin:0;font-weight:700;color:var(--ink);letter-spacing:-.01em}
  .meta p{font-size:13.5px;margin:3px 0 0;max-width:64ch;color:var(--muted)}
  .num{display:inline-block;background:var(--paper);color:var(--cta);font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;margin-right:8px}
  .pickbtn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;font:700 14px var(--j);cursor:pointer;transition:background .15s}
  .pickbtn:hover{background:var(--cta-d)}
  .pickbtn.on{background:var(--sage)}
  /* shared section bits */
  .sec{padding:54px 36px}
  .wrap{max-width:1040px;margin:0 auto}
  .eb{font:700 12px var(--j);letter-spacing:.18em;text-transform:uppercase;color:var(--cta);margin:0 0 9px}
  .h2{font:700 clamp(26px,3vw,34px)/1.06 var(--j);letter-spacing:-.02em;margin:0;color:var(--ink)}
  .it-t{font:700 16.5px var(--j);letter-spacing:-.01em;margin:0;color:var(--ink)}
  .it-d{font:400 14.5px/1.5 var(--j);margin:5px 0 0;color:var(--muted)}

  /* ---- A: Icon cards 2x2 (light) ---- */
  .A{background:var(--paper)}
  .A .head{text-align:center;max-width:46ch;margin:0 auto 34px}
  .A .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .A .ic{display:flex;gap:16px;background:#fff;border:1px solid var(--edge);border-radius:16px;padding:22px;box-shadow:var(--lift);transition:transform .18s,box-shadow .18s}
  .A .ic:hover{transform:translateY(-4px);box-shadow:0 26px 54px -26px rgba(40,50,70,.5)}
  .A .tile{flex:none;width:46px;height:46px;border-radius:12px;background:rgba(92,154,123,.13);display:flex;align-items:center;justify-content:center}

  /* ---- B: Dark mesh band ---- */
  .B{background:
      radial-gradient(circle at 12% 18%,rgba(199,93,56,.45),transparent 46%),
      radial-gradient(circle at 86% 82%,rgba(92,154,123,.42),transparent 48%),
      radial-gradient(circle at 70% 12%,rgba(242,194,172,.18),transparent 40%),
      var(--ink)}
  .B .eb{color:var(--soft)}
  .B .h2{color:#fff}
  .B .head{text-align:center;max-width:46ch;margin:0 auto 36px}
  .B .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .B .glass{display:flex;gap:15px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:16px;padding:22px}
  .B .it-t{color:#fff}
  .B .it-d{color:rgba(255,255,255,.72)}
  .B .tile{flex:none;width:44px;height:44px;border-radius:11px;background:rgba(242,194,172,.18);display:flex;align-items:center;justify-content:center}

  /* ---- C: Checklist rows (tinted) ---- */
  .C{background:linear-gradient(160deg,#FBE2D5 0%,var(--soft) 8%,var(--paper) 60%)}
  .C .head{margin:0 0 30px}
  .C .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 44px}
  .C .row{display:flex;gap:16px;align-items:flex-start;padding:18px 0;border-top:1px solid rgba(34,40,43,.09)}
  .C .ck{flex:none;width:32px;height:32px;border-radius:50%;background:rgba(199,93,56,.12);display:flex;align-items:center;justify-content:center;margin-top:1px}

  /* ---- D: Split intro ---- */
  .D{background:var(--white);border-top:1px solid var(--edge);border-bottom:1px solid var(--edge)}
  .D .row{display:grid;grid-template-columns:.82fr 1.18fr;gap:48px;align-items:start}
  .D .blurb{font:400 16px/1.55 var(--j);color:var(--muted);margin:16px 0 0;max-width:34ch}
  .D .list{display:flex;flex-direction:column;gap:8px}
  .D .item{display:flex;gap:15px;align-items:flex-start;padding:16px 0;border-bottom:1px solid var(--edge)}
  .D .item:last-child{border-bottom:0}
  .D .ck{flex:none;width:38px;height:38px;border-radius:11px;background:rgba(92,154,123,.13);display:flex;align-items:center;justify-content:center;margin-top:1px}

  /* sticky bar */
  #sticky{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:13px 22px;text-align:center;font:600 14px var(--j);z-index:60}
  #sticky b{color:var(--soft)}

  @media(max-width:760px){
    .sec{padding:40px 22px}
    .A .grid,.B .grid,.C .grid{grid-template-columns:1fr}
    .D .row{grid-template-columns:1fr;gap:26px}
  }
</style></head><body>
<div class="ph">
  <h1>Why section — premium previews</h1>
  <p>Four full-section design variations for the home “Why choose us” band, on the locked Beyond Passports brand. Click a Pick button to record your choice — Claude will build it.</p>
</div>
<div class="wrapx" id="list"></div>
<div id="sticky">Pick a “Why” section style below — your choice gets recorded.</div>

<script>
  // shared content
  var ITEMS=[
    ["We catch errors before they cost you","A human checks every document before submission."],
    ["One clear fee, no surprises","Our service fee is separate from the government fee — shown up front."],
    ["Express when you're short on time","Express speeds our handling — not the government's decision."],
    ["Honest advice","We'll tell you if you don't need us. No false promises on approval."]
  ];
  var EB="Why travellers choose us", H="We make sure it's right";

  // inline SVG icons (no emoji)
  function check(color){return '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M20 6L9 17l-5-5" stroke="'+color+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';}
  function stamp(color){return '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="9.2" stroke="'+color+'" stroke-width="1.7"/><path d="M8.2 12.2l2.6 2.6 5-5.4" stroke="'+color+'" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/></svg>';}

  var V={
    A:function(){
      var cards="";
      ITEMS.forEach(function(it){
        cards+='<div class="ic"><div class="tile">'+stamp("var(--sage)")+'</div><div><h3 class="it-t">'+it[0]+'</h3><p class="it-d">'+it[1]+'</p></div></div>';
      });
      return '<div class="sec A"><div class="wrap"><div class="head"><p class="eb">'+EB+'</p><h2 class="h2">'+H+'</h2></div><div class="grid">'+cards+'</div></div></div>';
    },
    B:function(){
      var cards="";
      ITEMS.forEach(function(it){
        cards+='<div class="glass"><div class="tile">'+stamp("var(--soft)")+'</div><div><h3 class="it-t">'+it[0]+'</h3><p class="it-d">'+it[1]+'</p></div></div>';
      });
      return '<div class="sec B"><div class="wrap"><div class="head"><p class="eb">'+EB+'</p><h2 class="h2">'+H+'</h2></div><div class="grid">'+cards+'</div></div></div>';
    },
    C:function(){
      var rows="";
      ITEMS.forEach(function(it){
        rows+='<div class="row"><div class="ck">'+check("var(--cta)")+'</div><div><h3 class="it-t">'+it[0]+'</h3><p class="it-d">'+it[1]+'</p></div></div>';
      });
      return '<div class="sec C"><div class="wrap"><div class="head"><p class="eb">'+EB+'</p><h2 class="h2">'+H+'</h2></div><div class="grid">'+rows+'</div></div></div>';
    },
    D:function(){
      var items="";
      ITEMS.forEach(function(it){
        items+='<div class="item"><div class="ck">'+check("var(--sage-t)")+'</div><div><h3 class="it-t">'+it[0]+'</h3><p class="it-d">'+it[1]+'</p></div></div>';
      });
      return '<div class="sec D"><div class="wrap"><div class="row"><div><p class="eb">'+EB+'</p><h2 class="h2">'+H+'</h2><p class="blurb">Every application is checked by a person, priced clearly, and handled with honest advice from start to finish.</p></div><div class="list">'+items+'</div></div></div></div>';
    }
  };

  var opts=[
    ["A","Icon cards 2×2 (light)","White cards on a paper band, each with a sage check-tile. Soft shadow, hover lift — clean and trustworthy."],
    ["B","Dark mesh band","Terracotta→sage radial mesh over ink, white heading, frosted-glass cards. A premium contrast break."],
    ["C","Checklist rows (tinted)","Soft peach→paper gradient with a two-column list of rows, each led by a terracotta check. Editorial."],
    ["D","Split intro","Heading + one-line blurb on the left, the four points stacked with check icons on the right. Asymmetric."]
  ];

  var html="";
  opts.forEach(function(o){
    html+='<div class="block" id="b-'+o[0]+'">'
       +'<div class="label">Option '+o[0]+' — '+o[1]+'</div>'
       +V[o[0]]()
       +'<div class="meta"><div><h4><span class="num">'+o[0]+'</span>'+o[1]+'</h4><p>'+o[2]+'</p></div>'
       +'<button class="pickbtn" data-k="'+o[0]+'" onclick="pickChoice(\''+o[0]+'\')">Pick '+o[0]+'</button></div>'
       +'</div>';
  });
  document.getElementById("list").innerHTML=html;

  function pickChoice(letter){
    fetch('/__pick?section=why&pick='+encodeURIComponent(letter)).catch(function(){});
    document.querySelectorAll('.pickbtn').forEach(function(x){x.classList.remove('on');x.textContent='Pick '+x.dataset.k;});
    document.querySelectorAll('.block').forEach(function(c){c.classList.remove('pick');});
    var b=document.querySelector('.pickbtn[data-k="'+letter+'"]'); if(b){b.classList.add('on');b.textContent='✓ Picked';}
    var bl=document.getElementById('b-'+letter); if(bl)bl.classList.add('pick');
    var s=document.getElementById('sticky'); if(s)s.innerHTML='Picked <b>Why '+letter+'</b> — recorded. Claude will build it.';
  }
</script>
</body></html>
