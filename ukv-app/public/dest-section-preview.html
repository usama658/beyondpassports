<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Destinations section — full previews</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--cta:#C75D38;--ink:#22282b;--muted:#697079;--sage:#5C9A7B;--sage-t:#3f7259;--paper:#F4F5F6;--edge:#e6e8ea;--white:#fff;--soft:#F2C2AC;--j:'Plus Jakarta Sans',system-ui,sans-serif;
    --lift2:0 24px 52px -24px rgba(40,50,70,.34);--lift3:0 36px 70px -30px rgba(40,50,70,.5)}
  *{box-sizing:border-box}body{margin:0;font-family:var(--j);color:var(--ink);background:#eceef0}
  .ph{max-width:1000px;margin:0 auto;padding:34px 22px 4px}.ph h1{font-size:26px;margin:0 0 6px;font-weight:700}.ph p{color:var(--muted);margin:0;max-width:70ch}
  .wrapx{max-width:1180px;margin:0 auto;padding:14px 16px}
  .block{background:#fff;border:1px solid var(--edge);border-radius:18px;overflow:hidden;margin:22px 0;box-shadow:0 16px 44px -30px rgba(40,50,70,.4)}
  .block.pick{outline:3px solid var(--cta);outline-offset:3px}
  .meta{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:16px 20px;flex-wrap:wrap;border-top:1px solid var(--edge)}
  .meta h4{font-size:17px;margin:0;font-weight:700}.meta p{font-size:13.5px;margin:3px 0 0;max-width:64ch;color:var(--muted)}
  .num{display:inline-block;background:var(--paper);color:var(--cta);font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;margin-right:8px}
  .pickbtn{background:var(--cta);color:#fff;border:0;border-radius:10px;padding:10px 18px;font:700 14px var(--j);cursor:pointer}.pickbtn.on{background:var(--sage)}

  /* the section */
  .sec{padding:48px 36px}
  .wrap{max-width:1080px;margin:0 auto}
  .eb{font:700 12px var(--j);letter-spacing:.18em;text-transform:uppercase;color:var(--cta);margin:0 0 8px}
  .h2{font:700 clamp(26px,3vw,34px)/1.05 var(--j);letter-spacing:-.02em;margin:0}
  .head{margin:0 0 26px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .rlink{display:inline-block;margin-top:24px;font:700 14px var(--j);color:var(--cta)}
  /* glass card */
  .card{position:relative;height:220px;border-radius:18px;overflow:hidden;background:center/cover;box-shadow:var(--lift2)}
  .card::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(20,18,16,.35))}
  .glass{position:absolute;left:12px;right:12px;bottom:12px;z-index:2;display:flex;justify-content:space-between;align-items:center;gap:10px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6);border-radius:14px;padding:11px 14px}
  .glass .k{font:700 10px var(--j);color:var(--sage-t);letter-spacing:.1em;text-transform:uppercase}.glass h5{font-size:17px;margin:2px 0 0}.glass .fee{font:800 17px var(--j);color:var(--cta)}

  /* backgrounds / layouts */
  .bgA{background:var(--white);border-top:1px solid var(--edge);border-bottom:1px solid var(--edge)}
  .bgB{background:linear-gradient(180deg,#FBF6F1,#F4F5F6)}
  .bgC{background:radial-gradient(600px 260px at 12% 0%,rgba(199,93,56,.5),transparent 60%),radial-gradient(560px 240px at 92% 100%,rgba(92,154,123,.5),transparent 60%),#22282b}
  .bgC .eb{color:var(--soft)}.bgC .h2{color:#fff}.bgC .rlink{color:var(--soft)}
  .cD .head{text-align:center}.cD .rlink{display:block;text-align:center}
  .bgD{background:radial-gradient(900px 320px at 50% -10%,rgba(199,93,56,.1),transparent 60%),var(--paper)}

  .sticky{position:fixed;left:0;right:0;bottom:0;background:var(--ink);color:#fff;padding:13px 22px;text-align:center;font:600 14px var(--j);z-index:60}.sticky b{color:var(--soft)}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
</style></head><body>
<div class="ph"><h1>Destinations section — full previews</h1><p>Whole section each time: background + heading + the glass cards + “see all” link. Pick one — tell me the letter.</p></div>
<div class="wrapx" id="list"></div>
<div class="sticky" id="sticky">Pick a section style, then tell me the letter (e.g. “Section C”).</div>
<script>
  var D=[['Turkey','eVisa','£39','/assets/img/destinations/turkey.jpg'],['Thailand','Visa-free','£35','/assets/img/destinations/thailand.jpg'],['India','eVisa','£49','/assets/img/destinations/india.jpg']];
  function cards(){var h='<div class="grid">';D.forEach(function(d){h+='<div class="card" style="background-image:url(\''+d[3]+'\')"><div class="glass"><div><div class="k">'+d[1]+'</div><h5>'+d[0]+'</h5></div><div class="fee">'+d[2]+'</div></div></div>';});return h+'</div>';}
  function sec(cls){return '<div class="sec '+cls+'"><div class="wrap"><div class="head"><p class="eb">Popular destinations</p><h2 class="h2">Clear requirements, fixed fees</h2></div>'+cards()+'<a class="rlink">See all destinations &amp; fixed fees →</a></div></div>';}
  var opts=[
   ['A','bgA','White band (current)','Clean white band, heading left, glass cards, link below. Calm, separates from the grey page.'],
   ['B','bgB','Warm tint band','Soft peach→paper gradient behind the cards. Warmer, ties to the brand without going dark.'],
   ['C','bgC','Dark mesh band','Terracotta→sage mesh on ink — white heading, glass cards pop. Dramatic premium break in the page.'],
   ['D','bgD cD','Centered + faint glow','Heading centred over a faint terracotta glow on paper. Editorial, symmetrical, gallery-like.']
  ];
  var html='';opts.forEach(function(o){html+='<div class="block" id="b-'+o[0]+'">'+sec(o[1])+'<div class="meta"><div><h4><span class="num">'+o[0]+'</span>'+o[2]+'</h4><p>'+o[3]+'</p></div><button class="pickbtn" data-k="'+o[0]+'">Pick '+o[0]+'</button></div></div>';});
  document.getElementById('list').innerHTML=html;
  document.querySelectorAll('.pickbtn').forEach(function(b){b.addEventListener('click',function(){
    document.querySelectorAll('.pickbtn').forEach(function(x){x.classList.remove('on');x.textContent='Pick '+x.dataset.k;});
    document.querySelectorAll('.block').forEach(function(c){c.classList.remove('pick');});
    b.classList.add('on');b.textContent='✓ Picked';document.getElementById('b-'+b.dataset.k).classList.add('pick');
    document.getElementById('sticky').innerHTML='Chosen: <b>Section '+b.dataset.k+'</b> — tell me in chat.';});});
</script></body></html>
