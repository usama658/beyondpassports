name: Deploy to A2 (beyondpassports.co.uk)

# Auto-deploy: every push to master SSHes into A2 and runs scripts/update-a2.sh.
# One-time setup (see SETUP-AUTODEPLOY below in the repo / DEPLOY-A2-STAGING):
#   GitHub repo → Settings → Secrets and variables → Actions → add:
#     A2_HOST     server hostname (e.g. mi3-ss112.a2hosting.com  or  beyondpassports.co.uk)
#     A2_USER     your cPanel username
#     A2_PORT     7822            (A2 shared SSH port — NOT 22)
#     A2_SSH_KEY  the PRIVATE key whose PUBLIC key is authorised in cPanel → SSH Access
#     A2_PHP      (optional) php binary; default /opt/alt/php82/usr/bin/php (A2 CloudLinux alt-php)
# First deploy must already be done once via scripts/deploy-a2.sh.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: a2-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy (plain ssh — no third-party action, passes repo Actions policy)
        env:
          A2_HOST: ${{ secrets.A2_HOST }}
          A2_USER: ${{ secrets.A2_USER }}
          A2_PORT: ${{ secrets.A2_PORT }}
          A2_SSH_KEY: ${{ secrets.A2_SSH_KEY }}
          A2_PHP: ${{ secrets.A2_PHP }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$A2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${A2_PORT:-7822}" -H "$A2_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/deploy_key -p "${A2_PORT:-7822}" -o StrictHostKeyChecking=accept-new \
            "$A2_USER@$A2_HOST" "cd ~/beyondpassports && git fetch --depth 1 origin master && git reset --hard origin/master && PHP='$A2_PHP' bash ukv-app/scripts/update-a2.sh"
